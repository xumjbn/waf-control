# xss/130401 — DOM XSS 关键字
SecRule ARGS "@rx (?i)(document\.(cookie|domain|write)|window\.location|eval\s*\(|setTimeout\s*\(\s*['\"]|setInterval\s*\(\s*['\"])" \
    "id:130401,\
     phase:2,\
     deny,\
     log,\
     msg:'XSS: DOM sink keywords',\
     severity:'HIGH',\
     tag:'attack-xss-dom',\
     t:none,t:urlDecodeUni,t:lowercase"
