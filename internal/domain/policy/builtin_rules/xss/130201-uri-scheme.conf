# xss/130201 — 危险 URI 协议
SecRule ARGS|REQUEST_HEADERS|REQUEST_BODY "@rx (?i)(javascript|vbscript|data|livescript)\s*:" \
    "id:130201,\
     phase:2,\
     deny,\
     log,\
     msg:'XSS: dangerous URI scheme',\
     severity:'CRITICAL',\
     tag:'attack-xss',\
     t:none,t:urlDecodeUni,t:htmlEntityDecode,t:lowercase"
