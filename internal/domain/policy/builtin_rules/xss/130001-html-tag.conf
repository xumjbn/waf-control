# xss/130001 — 危险 HTML 标签注入
SecRule ARGS|REQUEST_HEADERS|REQUEST_BODY "@rx (?i)<\s*(script|iframe|object|embed|svg|math|applet|meta|link)\b" \
    "id:130001,\
     phase:2,\
     deny,\
     status:403,\
     log,\
     msg:'XSS: dangerous HTML tag injection',\
     severity:'CRITICAL',\
     tag:'attack-xss',\
     t:none,t:urlDecodeUni,t:htmlEntityDecode,t:lowercase"
