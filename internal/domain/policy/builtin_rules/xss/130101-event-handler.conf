# xss/130101 — 内联事件处理器注入
SecRule ARGS|REQUEST_HEADERS|REQUEST_BODY "@rx (?i)\bon(load|error|click|mouseover|focus|blur|submit|change|keydown|keyup|keypress)\s*=" \
    "id:130101,\
     phase:2,\
     deny,\
     log,\
     msg:'XSS: inline event handler',\
     severity:'CRITICAL',\
     tag:'attack-xss',\
     t:none,t:urlDecodeUni,t:htmlEntityDecode,t:lowercase"
