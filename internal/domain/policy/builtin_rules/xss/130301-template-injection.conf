# xss/130301 — 模板/表达式注入（Jinja/EL/ASP）
SecRule ARGS|REQUEST_BODY "@rx (?i)(\{\{[^}]*\}\}|\$\{[^}]*\}|<%[^%]*%>)" \
    "id:130301,\
     phase:2,\
     deny,\
     log,\
     msg:'Template injection (Jinja/EL/ASP)',\
     severity:'HIGH',\
     tag:'attack-injection-template',\
     t:none,t:urlDecodeUni"
