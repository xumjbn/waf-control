# ip-reputation/110101 — 已知恶意 IP 黑名单
# 数据文件: /etc/modsecurity.d/data/blacklist-ip.txt
SecRule REMOTE_ADDR "@ipMatchFromFile /etc/modsecurity.d/data/blacklist-ip.txt" \
    "id:110101,\
     phase:1,\
     deny,\
     status:403,\
     log,\
     msg:'Blacklisted IP',\
     severity:'CRITICAL',\
     tag:'attack-reputation'"
