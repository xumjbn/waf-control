# ip-reputation/110201 — 高风险地区拦截（GeoIP）
# 依赖 ngx_http_geoip2_module，数据: /etc/modsecurity.d/data/geo-restricted.txt
SecRule GEO:COUNTRY_CODE "@pmFromFile /etc/modsecurity.d/data/geo-restricted.txt" \
    "id:110201,\
     phase:1,\
     deny,\
     status:403,\
     log,\
     msg:'Request from restricted country: %{geo.country_code}',\
     severity:'WARNING',\
     tag:'attack-geo'"
