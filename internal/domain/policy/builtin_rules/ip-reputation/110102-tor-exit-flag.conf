# ip-reputation/110102 — Tor 出口节点（标记不直接拦截）
SecRule REMOTE_ADDR "@ipMatchFromFile /etc/modsecurity.d/data/tor-exit-nodes.txt" \
    "id:110102,\
     phase:1,\
     pass,\
     log,\
     msg:'Request from Tor exit node',\
     severity:'NOTICE',\
     tag:'reputation-tor',\
     setvar:tx.tor_request=1"
