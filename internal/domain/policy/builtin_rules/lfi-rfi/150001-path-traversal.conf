# lfi-rfi/150001 — 路径遍历序列
SecRule ARGS|REQUEST_URI|REQUEST_HEADERS "@rx (?:\.\.[\\/]|\.\.%2[fF]|\.\.%5[cC]|%252e%252e[\/\\]|\.\.\\\\)" \
    "id:150001,\
     phase:2,\
     deny,\
     status:403,\
     log,\
     msg:'Path traversal sequence',\
     severity:'HIGH',\
     tag:'attack-lfi',\
     t:none,t:urlDecodeUni,t:lowercase"
