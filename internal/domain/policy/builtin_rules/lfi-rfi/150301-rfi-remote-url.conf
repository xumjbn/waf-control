# lfi-rfi/150301 — RFI 远程 URL
SecRule ARGS "@rx (?i)^(https?|ftp|gopher|dict|ldap|jar):\/\/" \
    "id:150301,\
     phase:2,\
     deny,\
     log,\
     msg:'RFI: remote URL in parameter',\
     severity:'HIGH',\
     tag:'attack-rfi',\
     t:none,t:urlDecodeUni,t:lowercase,\
     chain"
    SecRule ARGS_NAMES "@rx (?i)(file|page|template|include|require|path|url|src|dest|redirect|callback|next)"
