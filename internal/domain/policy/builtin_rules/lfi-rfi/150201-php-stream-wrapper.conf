# lfi-rfi/150201 — PHP 流包装器滥用
SecRule ARGS|REQUEST_URI "@rx (?i)(php://(filter|input|memory|temp|fd|stdin)|file://|expect://|data:text/plain;base64,|zip://|phar://)" \
    "id:150201,\
     phase:2,\
     deny,\
     log,\
     msg:'LFI: PHP stream wrapper abuse',\
     severity:'CRITICAL',\
     tag:'attack-lfi-php',\
     t:none,t:urlDecodeUni,t:lowercase"
