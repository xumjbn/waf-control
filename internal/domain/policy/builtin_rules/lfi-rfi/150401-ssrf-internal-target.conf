# lfi-rfi/150401 — SSRF 内网/云元数据探测
SecRule ARGS "@rx (?i)(127\.0\.0\.1|0\.0\.0\.0|localhost|::1|169\.254\.169\.254|metadata\.google\.internal|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})" \
    "id:150401,\
     phase:2,\
     deny,\
     log,\
     msg:'SSRF: internal/cloud-metadata target',\
     severity:'HIGH',\
     tag:'attack-ssrf',\
     t:none,t:urlDecodeUni,t:lowercase,\
     chain"
    SecRule ARGS_NAMES "@rx (?i)(url|host|target|endpoint|callback|webhook|return_url|redirect_uri)"
