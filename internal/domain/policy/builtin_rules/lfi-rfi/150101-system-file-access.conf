# lfi-rfi/150101 — 系统敏感文件读取
SecRule ARGS|REQUEST_URI "@rx (?i)(/etc/(passwd|shadow|hosts|nginx|apache2)|/proc/self/(environ|cmdline|status)|c:\\\\windows\\\\system32|boot\.ini|win\.ini|/var/log/(auth|nginx|apache))" \
    "id:150101,\
     phase:2,\
     deny,\
     log,\
     msg:'LFI: sensitive system file access',\
     severity:'CRITICAL',\
     tag:'attack-lfi',\
     t:none,t:urlDecodeUni,t:lowercase"
