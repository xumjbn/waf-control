# rce/140001 — Shell 命令注入
SecRule ARGS|REQUEST_BODY "@rx (?i)(?:[;&|`\$]|\$\(|<\(|>\()\s*(?:bash|sh|zsh|ksh|csh|tcsh|cmd\.exe|powershell|wget|curl|nc|netcat|telnet|ssh|ping|nslookup|dig|whoami|id|uname|cat\s+/etc)" \
    "id:140001,\
     phase:2,\
     deny,\
     status:403,\
     log,\
     msg:'RCE: shell command injection',\
     severity:'CRITICAL',\
     tag:'attack-rce',\
     t:none,t:urlDecodeUni,t:lowercase"
