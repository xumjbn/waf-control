# rce/140401 — WebShell 危险扩展名上传
SecRule FILES_NAMES "@rx (?i)\.(?:php\d?|phtml|phar|jsp[xw]?|aspx?|cer|asa|cfm|sh|py|pl|rb|war|ear|jar)$" \
    "id:140401,\
     phase:2,\
     deny,\
     log,\
     msg:'WebShell upload: dangerous extension %{matched_var}',\
     severity:'CRITICAL',\
     tag:'attack-webshell'"
