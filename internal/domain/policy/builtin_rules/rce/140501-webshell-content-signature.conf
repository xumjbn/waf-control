# rce/140501 — WebShell 上传内容指纹
SecRule FILES_TMP_CONTENT "@rx (?i)(<\?php|<%@\s*page|eval\s*\(\s*\$_(POST|GET|REQUEST|COOKIE)|base64_decode\s*\()" \
    "id:140501,\
     phase:2,\
     deny,\
     log,\
     msg:'WebShell upload: code signature in payload',\
     severity:'CRITICAL',\
     tag:'attack-webshell-content'"
