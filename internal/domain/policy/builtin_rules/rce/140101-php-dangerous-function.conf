# rce/140101 — PHP 危险函数调用
SecRule ARGS|REQUEST_BODY "@rx (?i)\b(eval|assert|exec|system|passthru|shell_exec|popen|proc_open|pcntl_exec|create_function|preg_replace.*\/e)\s*\(" \
    "id:140101,\
     phase:2,\
     deny,\
     log,\
     msg:'RCE: PHP dangerous function call',\
     severity:'CRITICAL',\
     tag:'attack-rce-php',\
     t:none,t:urlDecodeUni,t:lowercase"
