# sqli/120001 — 经典 SQL 关键字注入
SecRule ARGS|REQUEST_BODY|REQUEST_HEADERS:Cookie "@rx (?i)(union[\s\/\*]+(all[\s\/\*]+)?select|select[\s\/\*]+.*[\s\/\*]+from|insert[\s\/\*]+into|drop[\s\/\*]+(table|database)|delete[\s\/\*]+from|update[\s\/\*]+.*[\s\/\*]+set)" \
    "id:120001,\
     phase:2,\
     deny,\
     status:403,\
     log,\
     msg:'SQLi: keyword pattern UNION/SELECT/INSERT/DROP/DELETE/UPDATE',\
     severity:'CRITICAL',\
     tag:'attack-sqli',\
     t:none,t:urlDecodeUni,t:lowercase,t:replaceComments"
