# sqli/120201 — 布尔/时间盲注
SecRule ARGS|REQUEST_BODY "@rx (?i)(\b(or|and)\b\s+\d+\s*[=<>]\s*\d+|sleep\s*\(\s*\d+\s*\)|benchmark\s*\(|waitfor\s+delay)" \
    "id:120201,\
     phase:2,\
     deny,\
     log,\
     msg:'SQLi: boolean/time-based blind injection',\
     severity:'CRITICAL',\
     tag:'attack-sqli',\
     t:none,t:urlDecodeUni,t:lowercase"
