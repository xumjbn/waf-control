# sqli/120401 — NoSQL（MongoDB）操作符注入
SecRule ARGS|REQUEST_BODY "@rx (?i)(\$where|\$ne|\$gt|\$lt|\$regex|\$in)\s*[:=]" \
    "id:120401,\
     phase:2,\
     deny,\
     log,\
     msg:'NoSQLi: MongoDB operator injection',\
     severity:'HIGH',\
     tag:'attack-nosqli',\
     t:none,t:urlDecodeUni"
