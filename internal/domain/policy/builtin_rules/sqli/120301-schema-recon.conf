# sqli/120301 — 数据库元数据探测
SecRule ARGS|REQUEST_BODY "@rx (?i)(information_schema|pg_catalog|sysobjects|@@version|@@hostname|user\(\)|database\(\))" \
    "id:120301,\
     phase:2,\
     deny,\
     log,\
     msg:'SQLi: schema/metadata enumeration',\
     severity:'HIGH',\
     tag:'attack-sqli-recon',\
     t:none,t:urlDecodeUni,t:lowercase"
