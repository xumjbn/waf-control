# rate-limit/170301 — API token 维度计数（60s 窗口）
SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer\s+(.+)$" \
    "id:170301,\
     phase:1,\
     pass,\
     nolog,\
     capture,\
     setvar:tx.api_token=%{tx.1},\
     initcol:user=%{tx.api_token},\
     setvar:user.api_calls=+1,\
     expirevar:user.api_calls=60"
