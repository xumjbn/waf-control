# rate-limit/170201 — 注册/找回密码计数（1h 窗口）
SecRule REQUEST_URI "@rx (?i)/(register|signup|reset-?password|forgot-?password)" \
    "id:170201,\
     phase:1,\
     pass,\
     nolog,\
     chain"
    SecRule REQUEST_METHOD "@streq POST" \
        "setvar:ip.signup_attempts=+1,\
         expirevar:ip.signup_attempts=3600"
