# rate-limit/170401 — 支付/下单端点计数
SecRule REQUEST_URI "@rx (?i)/(checkout|order|payment|pay/(create|submit))" \
    "id:170401,\
     phase:1,\
     pass,\
     nolog,\
     chain"
    SecRule REQUEST_METHOD "@streq POST" \
        "setvar:ip.payment_calls=+1,\
         expirevar:ip.payment_calls=60"
