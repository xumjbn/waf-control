# rate-limit/170101 — 登录端点计数（5min 窗口）
SecRule REQUEST_URI "@rx (?i)/(login|signin|auth/(login|token)|oauth/token)" \
    "id:170101,\
     phase:1,\
     pass,\
     nolog,\
     chain"
    SecRule REQUEST_METHOD "@streq POST" \
        "setvar:ip.login_attempts=+1,\
         expirevar:ip.login_attempts=300"
