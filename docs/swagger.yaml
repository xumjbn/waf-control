paths:
  /acl/rules:
    get:
      consumes:
      - application/json
      description: 查询所有访问控制规则
      produces:
      - application/json
      responses:
        "200":
          description: 规则列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取访问控制规则列表
      tags:
      - 访问控制
    post:
      consumes:
      - application/json
      description: 创建新的访问控制规则
      parameters:
      - description: 规则信息
